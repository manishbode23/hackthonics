<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Feedback Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:400px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    background:#2e86de;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1b4f72;
}

.success{
    text-align:center;
    color:green;
    display:none;
}
</style>

</head>

<body>

<div class="container">

<h2>Doctor Feedback Form</h2>

<form id="feedbackForm">

<label>Patient Name</label>
<input type="text" required>

<label>Doctor Name</label>
<input type="text" required>

<label>Appointment Date</label>
<input type="date" required>

<label>Rating</label>
<select required>
<option value="">Select Rating</option>
<option>⭐ 1 - Poor</option>
<option>⭐⭐ 2 - Fair</option>
<option>⭐⭐⭐ 3 - Good</option>
<option>⭐⭐⭐⭐ 4 - Very Good</option>
<option>⭐⭐⭐⭐⭐ 5 - Excellent</option>
</select>

<label>Feedback / Comments</label>
<textarea rows="4" placeholder="Write your feedback here..." required></textarea>

<button type="submit">Submit Feedback</button>

</form>

<p class="success" id="msg">Thank you! Your feedback has been submitted.</p>

</div>

<script>
document.getElementById("feedbackForm").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("msg").style.display = "block";
    this.reset();
});
</script>

</body>
</html>
